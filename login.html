<!DOCTYPE html>
<html>
<head>
    <title>Log Masuk</title>
</head>
<body>
    <div style="text-align:center; margin-top: 100px;">
        <h2>Survey Lot Rumah</h2>
        <input type="text" id="userid" placeholder="ID"><br><br>
        <input type="password" id="password" placeholder="Kata Laluan"><br><br>
        <button onclick="checkLogin()">Log Masuk</button>
    </div>

    <script>
        function checkLogin() {
            var id = document.getElementById("userid").value;
            var pass = document.getElementById("password").value;
            
            console.log("Mencuba login dengan ID:", id); // Semak F12 Console

            // Sila pastikan nama fail peta anda betul (contoh: index.html atau peta.html)
            if(id === "admin" && pass === "12345") {
                console.log("Login berjaya, redirecting...");
                window.location.href = "index.html"; 
            } else {
                alert("ID atau Kata Laluan Salah!");
            }
        }
    </script>
</body>
</html>
