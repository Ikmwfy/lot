<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk - Survey Lot Rumah</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #444; }
        .forgot { color: #ff6b6b; margin-top: 15px; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Survey Lot Rumah</h2>
    <input type="text" id="userid" placeholder="👤 Masukkan ID">
    <input type="password" id="password" placeholder="🔑 Masukkan Kata Laluan">
    
    <button onclick="checkLogin()">Log Masuk</button>
    <a href="#" class="forgot">? Lupa Kata Laluan?</a>
</div>

<script>
    function checkLogin() {
        // Contoh logik mudah (Anda perlu hubungkan dengan database sebenar nanti)
        const id = document.getElementById('userid').value;
        const pass = document.getElementById('password').value;

        if (id === "admin" && pass === "1234") {
            window.location.href = "index.html"; // Redirect ke peta utama
        } else {
            alert("ID atau Kata Laluan salah!");
        }
    }
</script>

</body>
</html>
