<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/leaflet-search.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}

/* ================= HEADER ================= */
#header {
    position: relative;
    width: 100%;
    height: 110px;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 40px;
    z-index: 1001;
}

#header video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

#header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

#header img {
    height: 120px;
    margin-right: 30px;
    z-index: 2;
}

#header h1 {
    color: white;
    font-size: 28px;
    z-index: 2;
}

/* ================= MAP ================= */
#map {
    position: absolute;
    top: 110px;
    bottom: 0;
    width: 100%;
}

/* ================= GOOGLE STYLE BUTTON ================= */
#gmLayersBtn {
    position: absolute;
    bottom: 30px;
    right: 20px;
    width: 110px;
    height: 85px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    cursor: pointer;
    overflow: hidden;
    z-index: 1002;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

#gmLayersBtn img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#gmLayersBtn span {
    background: rgba(255,255,255,0.95);
    text-align: center;
    font-weight: bold;
    padding: 6px 0;
    font-size: 14px;
}

/* ================= FEATURE MENU ================= */
#featureMenu {
    position: absolute;
    top: 140px;
    right: 20px;
    width: 230px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    z-index: 1002;
    font-family: Arial;
}

#featureMenu h3 {
    font-size: 14px;
    margin: 8px 0;
}

#featureMenu select,
#featureMenu input,
#featureMenu button {
    width: 100%;
    margin-bottom: 10px;
}

#generatePDF {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="header">
    <video autoplay muted loop playsinline>
        <source src="VIDEO 1.mp4" type="video/mp4">
    </video>
    <img src="PUO.png">
    <h1>TAMAN SAUJANA PUTRA</h1>
</div>

<div id="map"></div>

<div id="gmLayersBtn">
    <img src="https://mt1.google.com/vt/lyrs=s&x=210000&y=120000&z=17">
    <span>Layers</span>
</div>

<div id="featureMenu">
    <h3>Land Explorer</h3>
    <select id="lotSelect">
        <option value="">-- Select Lot --</option>
    </select>

    <h3>Lot Opacity</h3>
    <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1">

    <button id="generatePDF">Generate PDF</button>
</div>

<script src="js/leaflet.js"></script>
<script src="js/leaflet-search.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>

<script>

var map = L.map('map').fitBounds([
[2.10309049233999,102.52084635053448],
[2.1044455032659752,102.52331439237805]
]);

/* ================= BASE MAP ================= */

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var satellite = L.tileLayer(
'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'
);

var terrain = L.tileLayer(
'https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}'
);

var traffic = L.tileLayer(
'https://mt1.google.com/vt/lyrs=h,traffic&x={x}&y={y}&z={z}'
);

var transit = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,transit&x={x}&y={y}&z={z}'
);

var bicycling = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,bike&x={x}&y={y}&z={z}'
);

/* ================= LOT LAYER ================= */

function styleLot() {
    return {
        color: '#232323',
        weight: 1,
        fillColor: '#a47158',
        fillOpacity: 1
    }
}

var layer_LOTFINAL_0 = L.geoJson(json_LOTFINAL_0, {
    style: styleLot
}).addTo(map);

var tandaLayer = L.geoJson(json_TandaSempadanGabung_1).addTo(map);

/* ================= LAYER CONTROL ================= */

var layerControl = L.control.layers(
{
    "Street": street,
    "Satellite": satellite,
    "Terrain": terrain
},
{
    "Traffic": traffic,
    "Transit": transit,
    "Bicycling": bicycling,
    "Lot": layer_LOTFINAL_0,
    "Boundary": tandaLayer
}
).addTo(map);

document.querySelector('.leaflet-control-layers').style.display="none";

document.getElementById("gmLayersBtn").onclick=function(){
var panel=document.querySelector('.leaflet-control-layers');
panel.style.display=(panel.style.display==="none")?"block":"none";
};

/* ================= LAND EXPLORER ================= */

var selectedLotLayer=null;

json_LOTFINAL_0.features.forEach(function(feature){
var option=document.createElement("option");
option.value=feature.properties.NO_LOT;
option.text=feature.properties.NO_LOT;
document.getElementById("lotSelect").appendChild(option);
});

document.getElementById("lotSelect").onchange=function(){
var selected=this.value;

layer_LOTFINAL_0.eachLayer(function(layer){

if(layer.feature.properties.NO_LOT==selected){

if(selectedLotLayer){
layer_LOTFINAL_0.resetStyle(selectedLotLayer);
}

layer.setStyle({
fillColor:'yellow',
fillOpacity:1,
weight:3
});

selectedLotLayer=layer;
map.fitBounds(layer.getBounds());
}

});
};

/* ================= OPACITY ================= */

document.getElementById("opacitySlider").oninput=function(){
layer_LOTFINAL_0.setStyle({
fillOpacity:this.value
});
};

/* ================= PDF ================= */

document.getElementById("generatePDF").onclick=function(){

if(!selectedLotLayer){
alert("Select lot first!");
return;
}

const { jsPDF } = window.jspdf;
var doc=new jsPDF();

var lotNo=selectedLotLayer.feature.properties.NO_LOT;
var area=selectedLotLayer.feature.properties.AREA||"N/A";

doc.setFontSize(18);
doc.text("LOT REPORT",20,20);

doc.setFontSize(14);
doc.text("Lot Number: "+lotNo,20,40);
doc.text("Area: "+area,20,50);

doc.save("Lot_"+lotNo+".pdf");

};

</script>

</body>
</html>
