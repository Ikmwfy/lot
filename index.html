<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">
<link rel="stylesheet" href="css/leaflet-search.css">
<link rel="stylesheet" href="css/leaflet.photon.css">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

/* ================= VIDEO HEADER ================= */
#header {
    position: relative;
    width: 100%;
    height: 110px;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 40px;
    z-index: 1001;
}

/* Video background */
#header video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
#header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Logo */
#header img {
    height: 150px;
    margin-right: 30px;
    transition: transform 0.4s ease;
}

#header img:hover {
    transform: scale(1.15);
}

/* Title */
#header h1 {
    color: white;
    font-size: 32px;
    font-weight: bold;
    margin: 0;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255,255,255,0.8);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ================= MAP ================= */
#map {
    position: absolute;
    top: 110px;
    bottom: 0;
    width: 100%;
}
</style>

<title>TAMAN SAUJANA PUTRA</title>
</head>

<body>

<!-- ================= HEADER WITH VIDEO ================= -->
<div id="header">

    <video autoplay muted loop playsinline>
        <source src="VIDEO 1.mp4" type="video/mp4">
    </video>

    <!-- ✅ LOGO DIKEMASKINI -->
    <img src="PUO.png" alt="Logo PUO">

    <h1>LOT PERUMAHAN</h1>

</div>

<div id="map"></div>

<script src="js/qgis2web_expressions.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/leaflet.rotatedMarker.js"></script>
<script src="js/leaflet.pattern.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>
<script src="js/rbush.min.js"></script>
<script src="js/labelgun.min.js"></script>
<script src="js/labels.js"></script>
<script src="js/leaflet.photon.js"></script>
<script src="js/leaflet-search.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>

<script>

var map = L.map('map', {
    zoomControl:false, 
    maxZoom:28, 
    minZoom:1
}).fitBounds([[2.10309049233999,102.52084635053448],
              [2.1044455032659752,102.52331439237805]]);

var hash = new L.Hash(map);

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var satellite = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    attribution: '&copy; Google'
});

L.control.layers({
    "OpenStreetMap": osm,
    "Satelit": satellite
}, null, {
    position: 'topright'
}).addTo(map);

L.control.zoom({ position: 'topleft' }).addTo(map);

function style_LOTFINAL_0() {
    return {
        color: '#232323',
        weight: 1,
        fillColor: '#a47158',
        fillOpacity: 1
    }
}

var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
    style: style_LOTFINAL_0
}).addTo(map);

function style_Tanda() {
    return {
        radius: 4,
        color: '#232323',
        fillColor: '#d5b43c',
        fillOpacity: 1
    }
}

new L.geoJson(json_TandaSempadanGabung_1, {
    pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng, style_Tanda());
    }
}).addTo(map);

map.addControl(new L.Control.Search({
    layer: layer_LOTFINAL_0,
    propertyName: 'NO_LOT',
    hideMarkerOnCollapse: true,
    initial: false
}));

</script>

</body>
</html>
