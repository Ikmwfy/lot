<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TAMAN SAUJANA PUTRA</title>

<link rel="stylesheet" href="css/leaflet.css">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

.leaflet-top.leaflet-left {
    top: 70px;
}

#map {
    position: absolute;
    top: 110px;
    bottom: 35px;
    width: 100%;
}

#footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #8b5e3c;
    color: white;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    z-index: 5000;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="footer">
Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar
</div>

<!-- ================= JS ================= -->

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* ================= MAP ================= */

var map = L.map('map', {
    zoomControl: false,
    maxZoom: 22,
    minZoom: 5
}).fitBounds([
[2.10309049233999,102.52084635053448],
[2.1044455032659752,102.52331439237805]
]);

L.control.zoom({ position: 'topleft' }).addTo(map);

/* ================= BASEMAP ================= */

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom: 22 }).addTo(map);

/* ================= STYLE ================= */

function style_LOTFINAL_0() {
    return {
        color: '#5a3e2b',
        weight: 1,
        fillColor: '#a47148',
        fillOpacity: 1
    };
}

function highlightStyle() {
    return {
        color: '#000000',
        weight: 2,
        fillColor: 'yellow',
        fillOpacity: 1
    };
}

var selectedLayer = null;

/* ================= LOT FUNCTION ================= */

function onEachFeature_LOTFINAL_0(feature, layer) {

    layer.on("click", function() {

        if (selectedLayer) {
            selectedLayer.setStyle(style_LOTFINAL_0());
        }

        selectedLayer = layer;
        layer.setStyle(highlightStyle());
        layer.bringToFront();

        updateLotInfo(feature.properties);
    });
}

var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
    style: style_LOTFINAL_0,
    onEachFeature: onEachFeature_LOTFINAL_0
}).addTo(map);

var tandaLayer = new L.geoJson(json_TandaSempadanGabung_1,{
pointToLayer:function(feature,latlng){
return L.circleMarker(latlng,{
radius:4,
color:'#232323',
fillColor:'#d5b43c',
fillOpacity:1
});
}}).addTo(map);

/* ================= INFO UPDATE ================= */

function updateLotInfo(properties){
    console.log("Lot dipilih:", properties);
}

/* ================= GENERATE PDF ================= */

document.addEventListener("keydown", function(e){
    if(e.key === "p"){
        generatePDF();
    }
});

async function generatePDF(){

    if(!selectedLayer){
        alert("Sila pilih lot dahulu.");
        return;
    }

    const { jsPDF } = window.jspdf;
    var pdf = new jsPDF("p", "mm", "a4");

    var prop = selectedLayer.feature.properties;

    // Snapshot map dengan highlight
    var canvas = await html2canvas(document.getElementById("map"));
    var imgData = canvas.toDataURL("image/png");

    pdf.setFontSize(16);
    pdf.text("MAKLUMAT LOT TAMAN SAUJANA PUTRA", 30, 20);

    pdf.setFontSize(12);
    pdf.text("No PA: " + prop["tsp — _1"], 20, 40);
    pdf.text("No Lot: " + prop["NO_LOT"], 20, 50);
    pdf.text("Keluasan: " + parseFloat(prop["AREA"]).toFixed(3) + " m²", 20, 60);
    pdf.text("Pemilik: " + prop["tsp — pe"], 20, 70);

    pdf.addImage(imgData, "PNG", 15, 85, 180, 100);

    pdf.save("Maklumat_Lot.pdf");
}

</script>

</body>
</html>
