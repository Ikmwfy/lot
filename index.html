<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistem Pengurusan Lot</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ================= MAP ================= */
#map {
    height: 100%;
    width: 100%;
}

/* ================= SIDEBAR ================= */
#sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100%;
    background: #ffffff;
    box-shadow: 3px 0 15px rgba(0,0,0,0.3);
    padding: 20px;
    transition: 0.3s;
    z-index: 2000;
    overflow-y: auto;
}

#sidebar.active {
    left: 0;
}

#menuBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 8px 14px;
    border-radius: 6px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 2100;
}

h3 {
    margin-top: 0;
}

input, button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    margin-bottom: 15px;
}

button {
    background: #6f4e37;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #5a3e2b;
}

/* ================= FOOTER ================= */
#footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    color: white;
    text-align: center;
    padding: 6px 0;
    font-size: 13px;
    z-index: 3000;
}
</style>
</head>

<body>

<div id="menuBtn">☰ Menu</div>

<div id="sidebar">
    <h3>Land Management</h3>

    <label>Lot Opacity</label>
    <input type="range" min="0" max="1" step="0.1" value="1" id="opacitySlider">

    <label>Land Explorer (No Lot)</label>
    <input type="text" id="searchLot" placeholder="Masukkan No Lot">
    <button onclick="searchLot()">Cari Lot</button>

    <button onclick="generatePDF()">Generate PDF Lot</button>
</div>

<div id="map"></div>

<div id="footer">
Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar
</div>

<script>

// ================= MAP INIT =================
var map = L.map('map', {
    maxZoom: 22
}).setView([2.104, 102.522], 17);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom: 22 }
).addTo(map);

// ================= SAMPLE LOT DATA =================
var selectedLayer = null;

var lotData = {
"type": "FeatureCollection",
"features": [
{
"type": "Feature",
"properties": {"lot_no": "101"},
"geometry": {
"type": "Polygon",
"coordinates": [[[102.5221,2.1041],[102.5223,2.1041],[102.5223,2.1043],[102.5221,2.1043],[102.5221,2.1041]]]
}
},
{
"type": "Feature",
"properties": {"lot_no": "102"},
"geometry": {
"type": "Polygon",
"coordinates": [[[102.5224,2.1041],[102.5226,2.1041],[102.5226,2.1043],[102.5224,2.1043],[102.5224,2.1041]]]
}
}
]
};

// ================= STYLE =================
function lotStyle() {
    return {
        color: '#5a3e2b',
        weight: 1,
        fillColor: '#a47148',
        fillOpacity: 1
    };
}

var lotLayer = L.geoJSON(lotData, {
    style: lotStyle,
    onEachFeature: function (feature, layer) {
        layer.bindPopup("No Lot: " + feature.properties.lot_no);
    }
}).addTo(map);

// ================= MENU TOGGLE =================
document.getElementById("menuBtn").onclick = function() {
    document.getElementById("sidebar").classList.toggle("active");
};

// ================= OPACITY CONTROL =================
document.getElementById("opacitySlider").addEventListener("input", function(e){
    var value = e.target.value;
    lotLayer.eachLayer(function(layer){
        layer.setStyle({fillOpacity: value});
    });
});

// ================= SEARCH FUNCTION =================
function searchLot(){
    var lotNumber = document.getElementById("searchLot").value;

    lotLayer.eachLayer(function(layer){

        if(selectedLayer){
            lotLayer.resetStyle(selectedLayer);
        }

        if(layer.feature.properties.lot_no == lotNumber){
            selectedLayer = layer;

            layer.setStyle({
                fillColor: 'yellow'
            });

            map.fitBounds(layer.getBounds());
        }
    });
}

// ================= GENERATE PDF =================
function generatePDF(){

    if(!selectedLayer){
        alert("Sila pilih lot dahulu!");
        return;
    }

    const { jsPDF } = window.jspdf;
    var doc = new jsPDF();

    var lotNumber = selectedLayer.feature.properties.lot_no;

    doc.setFontSize(16);
    doc.text("MAKLUMAT LOT", 20, 20);

    doc.setFontSize(12);
    doc.text("No Lot: " + lotNumber, 20, 40);
    doc.text("Tarikh: " + new Date().toLocaleDateString(), 20, 50);

    doc.text("Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar", 20, 70);

    doc.save("Lot_" + lotNumber + ".pdf");
}

</script>

</body>
</html>
