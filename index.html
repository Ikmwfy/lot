<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">

<style>
html, body {width:100%;height:100%;margin:0;padding:0;}
.leaflet-top.leaflet-left{top:70px;}

#menuBtn{position:absolute;top:130px;left:15px;background:#5a3e2b;color:white;padding:10px 14px;border-radius:8px;cursor:pointer;z-index:6000;font-weight:bold;}

#dashboard{
position:absolute;
top:110px;
left:-340px;
width:300px;
bottom:35px;
background:white;
z-index:5500;
padding:18px;
overflow-y:auto;
transition:0.3s;
font-family:Arial;
}

#dashboard.active{left:0;}

.dashboard-section{margin-bottom:18px;}

.dashboard-section input,
.dashboard-section button{
width:100%;
padding:6px;
margin-top:5px;
}

.dashboard-section button{
background:#8b5e3c;
color:white;
border:none;
cursor:pointer;
}

.dashboard-info{
background:#f3f3f3;
padding:8px;
margin-top:8px;
font-size:14px;
}

#footer{
position:fixed;
bottom:0;
width:100%;
background:#8b5e3c;
color:white;
text-align:center;
padding:8px 0;
font-size:14px;
z-index:5000;
}

#gmLayersBtn{
position:absolute;
bottom:60px;
right:20px;
width:110px;
height:85px;
background:white;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.3);
cursor:pointer;
overflow:hidden;
z-index:1002;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

#gmLayersBtn img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#gmLayersBtn span{
position:relative;
background:rgba(255,255,255,0.95);
text-align:center;
font-weight:bold;
padding:6px 0;
font-size:14px;
}

#gmPanel{
position:absolute;
bottom:150px;
right:20px;
width:260px;
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:2000;
padding:18px;
display:none;
font-family:Arial;
}

.gmOption{display:flex;align-items:center;margin-bottom:8px;}
.gmDivider{height:1px;background:#ddd;margin:12px 0;}

#header{
position:relative;
width:100%;
height:110px;
overflow:hidden;
display:flex;
align-items:center;
padding:0 40px;
}

#header video{
position:absolute;
top:50%;
left:50%;
min-width:100%;
min-height:100%;
transform:translate(-50%,-50%);
object-fit:cover;
z-index:-2;
}

#header::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
top:0;
left:0;
}

#header img{
height:160px;
margin-right:40px;
z-index:2;
}

#header h1{
color:white;
font-size:32px;
font-weight:bold;
margin:0;
z-index:2;
}

#northArrow{
position:absolute;
top:130px;
right:20px;
width:45px;
height:45px;
background:white;
border-radius:50%;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
display:flex;
align-items:center;
justify-content:center;
z-index:4000;
}

#map{
position:absolute;
top:110px;
bottom:35px;
width:100%;
}
</style>

<title>TAMAN SAUJANA PUTRA</title>
</head>

<body>

<div id="header">
<video autoplay muted loop playsinline>
<source src="VIDEO 1.mp4" type="video/mp4">
</video>
<img src="PUO.png">
<h1>TAMAN SAUJANA PUTRA</h1>
</div>

<div id="map"></div>

<div id="northArrow">
<img src="north.png" width="40">
</div>

<div id="menuBtn">☰ Menu</div>

<div id="dashboard">

<div style="display:flex;justify-content:space-between;">
<h2>DASHBOARD</h2>
<button id="closeDashboard">✖</button>
</div>
<hr>

<div class="dashboard-section">
<label>Total Lot</label>
<div id="totalLot" class="dashboard-info"></div>
</div>

<div class="dashboard-section">
<label>Lot Opacity</label>
<input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1">
</div>

<div class="dashboard-section">
<label>Land Explorer</label>
<input type="text" id="searchLot" placeholder="Masukkan No Lot">
<button id="findLot">Find Lot</button>
<button id="resetLot">Reset Lot</button>
</div>

<div class="dashboard-section">
<label>Maklumat Lot Dipilih</label>
<div id="lotInfo" class="dashboard-info">Tiada lot dipilih</div>
<button id="generatePDF">Generate PDF Lot</button>
</div>

</div>

<div id="gmLayersBtn">
<img src="MAPS.png">
<span>Layers</span>
</div>

<div id="gmPanel">

<h3>Map Type</h3>
<div class="gmOption"><input type="radio" name="basemap" id="streetRadio" checked>Street</div>
<div class="gmOption"><input type="radio" name="basemap" id="satRadio">Satellite</div>
<div class="gmOption"><input type="radio" name="basemap" id="terrainRadio">Terrain</div>

<div class="gmDivide
