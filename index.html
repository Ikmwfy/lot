<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

/* ================= FOOTER ================= */

#footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.75);
    color: white;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    z-index: 5000;
}

/* ================= LAYERS BUTTON ================= */

#gmLayersBtn {
    position: absolute;
    bottom: 60px; /* dinaikkan supaya tak ganggu footer */
    right: 20px;
    width: 110px;
    height: 85px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    cursor: pointer;
    overflow: hidden;
    z-index: 1002;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

#gmLayersBtn img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#gmLayersBtn span {
    position: relative;
    background: rgba(255,255,255,0.95);
    text-align: center;
    font-weight: bold;
    padding: 6px 0;
    font-size: 14px;
}

/* ================= PANEL ================= */

#gmPanel {
    position: absolute;
    bottom: 150px;
    right: 20px;
    width: 260px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 2000;
    padding: 18px;
    display: none;
    font-family: Arial, sans-serif;
}

.gmOption {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
}

.gmDivider {
    height: 1px;
    background: #ddd;
    margin: 12px 0;
}

/* ================= HEADER ================= */

#header {
    position: relative;
    width: 100%;
    height: 110px;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 40px;
}

#header video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

#header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

#header img {
    height: 160px;
    margin-right: 40px;
    z-index: 2;
}

#header h1 {
    color: white;
    font-size: 32px;
    font-weight: bold;
    margin: 0;
    z-index: 2;
}

/* ================= MAP ================= */

#map {
    position: absolute;
    top: 110px;
    bottom: 35px; /* ruang untuk footer */
    width: 100%;
}
</style>

<title>TAMAN SAUJANA PUTRA</title>
</head>

<body>

<div id="header">
    <video autoplay muted loop playsinline>
        <source src="VIDEO 1.mp4" type="video/mp4">
    </video>
    <img src="PUO.png">
    <h1>TAMAN SAUJANA PUTRA</h1>
</div>

<div id="map"></div>

<!-- Layers Button -->
<div id="gmLayersBtn">
    <img src="MAPS.png">
    <span>Layers</span>
</div>

<!-- Panel -->
<div id="gmPanel">

<h3>Map Type</h3>
<div class="gmOption"><input type="radio" name="basemap" id="streetRadio" checked>Street</div>
<div class="gmOption"><input type="radio" name="basemap" id="satRadio">Satellite</div>
<div class="gmOption"><input type="radio" name="basemap" id="terrainRadio">Terrain</div>

<div class="gmDivider"></div>

<h3>Map Details</h3>
<div class="gmOption"><input type="checkbox" id="trafficCheck">Traffic</div>
<div class="gmOption"><input type="checkbox" id="transitCheck">Transit</div>
<div class="gmOption"><input type="checkbox" id="bikeCheck">Bicycling</div>

<div class="gmDivider"></div>

<h3>Data Layer</h3>
<div class="gmOption"><input type="checkbox" id="lotCheck" checked>Lot Final</div>
<div class="gmOption"><input type="checkbox" id="tandaCheck" checked>Tanda Sempadan</div>

</div>

<!-- FOOTER -->
<div id="footer">
    Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar
</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>

<script>

/* ================= MAP SETTING ================= */

var map = L.map('map', {
    zoomControl: true,
    maxZoom: 22,
    minZoom: 5
}).fitBounds([
[2.10309049233999,102.52084635053448],
[2.1044455032659752,102.52331439237805]
]);

/* ================= BASEMAP ================= */

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom: 22 }).addTo(map);

var satellite = L.tileLayer(
'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var terrain = L.tileLayer(
'https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var traffic = L.tileLayer(
'https://mt1.google.com/vt/lyrs=h,traffic&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var transit = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,transit&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var bicycling = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,bike&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

/* ================= LOT FINAL WARNA COKLAT ================= */

/* ================= LOT FINAL INTERACTIVE ================= */

function style_LOTFINAL_0() {
    return {
        color: '#5a3e2b',
        weight: 1,
        fillColor: '#a47148',
        fillOpacity: 1
    };
}

/* STYLE BILA LOT DIPILIH */
function highlightStyle() {
    return {
        color: '#000000',
        weight: 2,
        fillColor: 'yellow',
        fillOpacity: 1
    };
}

var selectedLayer = null;

function onEachFeature_LOTFINAL_0(feature, layer) {

    layer.on({
        click: function(e) {

            // Reset lot sebelum ini
            if (selectedLayer) {
                selectedLayer.setStyle(style_LOTFINAL_0());
            }

            // Simpan lot yang dipilih
            selectedLayer = layer;

            // Tukar warna kuning
            layer.setStyle(highlightStyle());

            // Pastikan layer berada di atas
            layer.bringToFront();

            // Popup maklumat (ubah ikut attribute dalam file LOTFINAL_0.js)
            var popupContent = 
"<b>No Lot:</b> " + feature.properties.NO_LOT + "<br>" +
"<b>Keluasan:</b> " + feature.properties.KELUASAN + " m²<br>" +
"<b>Pemilik:</b> " + feature.properties.PEMILIK;

            for (var key in feature.properties) {
                popupContent += key + ": " + feature.properties[key] + "<br>";
            }

            layer.bindPopup(popupContent).openPopup();
        }
    });
}

var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
    style: style_LOTFINAL_0,
    onEachFeature: onEachFeature_LOTFINAL_0
}).addTo(map);

var tandaLayer = new L.geoJson(json_TandaSempadanGabung_1,{
pointToLayer:function(feature,latlng){
return L.circleMarker(latlng,{
radius:4,
color:'#232323',
fillColor:'#d5b43c',
fillOpacity:1
});
}}).addTo(map);

/* ================= PANEL FUNCTION ================= */

var gmPanel=document.getElementById("gmPanel");

document.getElementById("gmLayersBtn").onclick=function(){
gmPanel.style.display=gmPanel.style.display==="block"?"none":"block";
};

document.getElementById("streetRadio").onclick=function(){
map.removeLayer(satellite); map.removeLayer(terrain); map.addLayer(street);
};

document.getElementById("satRadio").onclick=function(){
map.removeLayer(street); map.removeLayer(terrain); map.addLayer(satellite);
};

document.getElementById("terrainRadio").onclick=function(){
map.removeLayer(street); map.removeLayer(satellite); map.addLayer(terrain);
};

document.getElementById("trafficCheck").onchange=function(){
this.checked?map.addLayer(traffic):map.removeLayer(traffic);
};

document.getElementById("transitCheck").onchange=function(){
this.checked?map.addLayer(transit):map.removeLayer(transit);
};

document.getElementById("bikeCheck").onchange=function(){
this.checked?map.addLayer(bicycling):map.removeLayer(bicycling);
};

document.getElementById("lotCheck").onchange=function(){
this.checked?map.addLayer(layer_LOTFINAL_0):map.removeLayer(layer_LOTFINAL_0);
};

document.getElementById("tandaCheck").onchange=function(){
this.checked?map.addLayer(tandaLayer):map.removeLayer(tandaLayer);
};

</script>

</body>
</html>
