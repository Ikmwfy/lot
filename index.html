<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAMAN SAUJANA PUTRA - PELAN AKUI</title>
    <link rel="stylesheet" href="css/leaflet.css">
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #header { position: relative; width: 100%; height: 110px; overflow: hidden; display: flex; align-items: center; padding: 0 40px; background: #000; }
        #header video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; z-index: 1; opacity: 0.6; }
        #header img { height: 80px; z-index: 2; margin-right: 20px; }
        #header h1 { color: white; font-size: 28px; z-index: 2; margin: 0; }
        
        #map { position: absolute; top: 110px; bottom: 35px; width: 100%; z-index: 10; }
        
        #menuBtn { position: absolute; top: 130px; left: 15px; background: #5a3e2b; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 6000; font-weight: bold; }
        
        #dashboard { position: absolute; top: 110px; left: -340px; width: 300px; bottom: 35px; background: white; z-index: 5500; padding: 20px; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); overflow-y: auto; }
        #dashboard.active { left: 0; }
        
        .dashboard-section { margin-bottom: 20px; }
        .dashboard-section label { font-weight: bold; display: block; margin-bottom: 5px; color: #5a3e2b; }
        .dashboard-info { background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; line-height: 1.6; }
        
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #8b5e3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a3e2b; }
        
        #footer { position: fixed; bottom: 0; width: 100%; background: #8b5e3c; color: white; text-align: center; padding: 8px 0; font-size: 12px; z-index: 5000; }
    </style>
</head>
<body>

<div id="header">
    <video autoplay muted loop playsinline><source src="VIDEO 1.mp4" type="video/mp4"></video>
    <img src="PUO.png" alt="Logo">
    <h1>TAMAN SAUJANA PUTRA</h1>
</div>

<div id="map"></div>
<div id="menuBtn">☰ MENU</div>

<div id="dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-size:20px;">DASHBOARD</h2>
        <span id="closeDash" style="cursor:pointer; font-weight:bold;">✕</span>
    </div>
    <hr>
    <div class="dashboard-section">
        <label>Carian Lot</label>
        <input type="text" id="searchLot" placeholder="Contoh: 11474">
        <button id="findLotBtn">CARI LOT</button>
    </div>
    <div class="dashboard-section">
        <label>Maklumat Lot Dipilih</label>
        <div id="lotInfo" class="dashboard-info">Sila klik pada lot di peta atau gunakan carian.</div>
        <button id="btnPDF" style="background: #27ae60;">GENERATE PDF LOT</button>
    </div>
</div>

<div id="footer">Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    /* 1. Inisialisasi Peta dengan preferCanvas untuk Kestabilan PDF */
    var map = L.map('map', {
        zoomControl: false,
        preferCanvas: true, // Memastikan polygon tidak lari semasa generate PDF
        zoomAnimation: false,
        fadeAnimation: false
    }).setView([2.1037, 102.5220], 18);

    L.control.zoom({ position: 'topleft' }).addTo(map);

    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        attribution: 'Google Satellite'
    }).addTo(map);

    /* 2. Gaya Lot */
    function styleLot(feature) {
        return { color: '#5a3e2b', weight: 1, fillColor: '#a47148', fillOpacity: 0.6 };
    }
    
    function highlightStyle() {
        return { color: '#000', weight: 3, fillColor: 'yellow', fillOpacity: 0.8 };
    }

    var selectedLayer = null;

    /* 3. Fungsi Klik Lot */
    function onEachFeature(feature, layer) {
        layer.on('click', function (e) {
            if (selectedLayer) { layer_LOTFINAL_0.resetStyle(selectedLayer); }
            selectedLayer = layer;
            layer.setStyle(highlightStyle());
            
            var p = feature.properties;
            document.getElementById("lotInfo").innerHTML = `
                <b>No PA:</b> ${p["tsp — _1"] || '-'}<br>
                <b>No Lot:</b> ${p["NO_LOT"]}<br>
                <b>Luas:</b> ${parseFloat(p["AREA"]).toFixed(2)} m²<br>
                <b>Pemilik:</b> ${p["tsp — pe"] || '-'}
            `;
            
            L.popup()
                .setLatLng(e.latlng)
                .setContent(`<b>Lot: ${p["NO_LOT"]}</b>`)
                .openOn(map);
        });
    }

    var layer_LOTFINAL_0 = L.geoJson(json_LOTFINAL_0, {
        style: styleLot,
        onEachFeature: onEachFeature
    }).addTo(map);

    /* 4. Fungsi Generate PDF mengikut Contoh Gambar */
    document.getElementById("btnPDF").onclick = function() {
        if (!selectedLayer) { alert("Sila pilih satu lot terlebih dahulu."); return; }

        // Sembunyikan UI peta untuk rakaman bersih
        map.closePopup();
        document.querySelector('.leaflet-control-container').style.display = 'none';

        html2canvas(document.getElementById("map"), {
            useCORS: true,
            scale: 2,
            logging: false
        }).then(canvas => {
            const { jsPDF } = window.jspdf;
            var pdf = new jsPDF("landscape", "mm", "a4");
            var p = selectedLayer.feature.properties;

            // --- REKA BENTUK FRAME (Layout) ---
            pdf.setLineWidth(0.8);
            pdf.rect(5, 5, 287, 200); // Bingkai luar
            pdf.line(70, 5, 70, 205); // Garis pembahagi kiri
            pdf.line(70, 150, 292, 150); // Garis pembahagi bawah peta

            // --- HEADER KIRI ---
            // Sila pastikan file PUO.png ada dalam folder atau gunakan URL base64
            // pdf.addImage(logoData, 'PNG', 25, 12, 25, 18); 
            pdf.setFontSize(10); pdf.setFont("helvetica", "bold");
            pdf.text("POLITEKNIK UNGKU OMAR", 37, 35, { align: "center" });
            pdf.line(10, 40, 65, 40);

            // --- DATA LOKASI ---
            pdf.setFontSize(12);
            pdf.text("NEGERI JOHOR", 15, 55);
            pdf.setTextColor(220, 0, 0); pdf.text("TANGKAK", 15, 63);
            pdf.setTextColor(0); pdf.text("DAERAH LEDANG", 15, 71);
            pdf.text("MUKIM KESANG", 15, 79);

            pdf.setFontSize(14);
            pdf.text("LOT " + p["NO_LOT"], 15, 95);
            pdf.setFontSize(10); pdf.setFont("helvetica", "normal");
            pdf.text("SKALA 1 : 400", 15, 105);
            pdf.line(10, 115, 65, 115);

            // --- MAKLUMAT PEMILIK (KIRI BAWAH) ---
            pdf.setFont("helvetica", "bold"); pdf.text("NAMA PEMILIK:", 10, 130);
            pdf.setFont("helvetica", "normal");
            var owner = p["tsp — pe"] || "-";
            pdf.text(pdf.splitTextToSize(owner, 55), 10, 137);

            pdf.setFont("helvetica", "bold"); pdf.text("NO. LOT:", 10, 158);
            pdf.setFont("helvetica", "normal"); pdf.text(String(p["NO_LOT"]), 10, 165);

            pdf.setFont("helvetica", "bold"); pdf.text("LUAS LOT:", 10, 178);
            pdf.setFont("helvetica", "normal"); pdf.text(parseFloat(p["AREA"]).toFixed(2) + " m²", 10, 185);

            // --- GAMBAR PETA ---
            var imgData = canvas.toDataURL("image/jpeg", 1.0);
            pdf.addImage(imgData, 'JPEG', 71, 25, 220, 124);
            pdf.setFont("helvetica", "bold"); pdf.setFontSize(22);
            pdf.text("PELAN AKUI", 185, 18, { align: "center" });

            // --- NOMBOR PA BESAR (BAWAH TENGAH) ---
            pdf.setFont("times", "bold"); pdf.setFontSize(55);
            var paNo = p["tsp — _1"] || "";
            pdf.text("PA " + paNo, 185, 185, { align: "center" });

            // --- FOOTER ---
            pdf.setFontSize(8); pdf.setFont("helvetica", "italic");
            pdf.text("Dokumen ini dijana secara digital melalui Sistem Saujana Putra Smart Resident", 185, 198, { align: "center" });

            pdf.save(`Pelan_Akui_Lot_${p["NO_LOT"]}.pdf`);
            
            // Tampilkan semula UI peta
            document.querySelector('.leaflet-control-container').style.display = 'block';
        });
    };

    /* UI Dashboard Logic */
    document.getElementById("menuBtn").onclick = function() { document.getElementById("dashboard").classList.add("active"); };
    document.getElementById("closeDash").onclick = function() { document.getElementById("dashboard").classList.remove("active"); };

    document.getElementById("findLotBtn").onclick = function() {
        var val = document.getElementById("searchLot").value;
        layer_LOTFINAL_0.eachLayer(function(layer) {
            if (layer.feature.properties.NO_LOT == val) {
                map.fitBounds(layer.getBounds());
                layer.fire('click');
            }
        });
    };
</script>

</body>
</html>
