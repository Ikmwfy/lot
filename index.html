<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/leaflet.css">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

.leaflet-top.leaflet-left {
    top: 70px;
}

#menuBtn {
    position: absolute;
    top: 130px;
    left: 15px;
    background: #5a3e2b;
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 6000;
    font-weight: bold;
}

#dashboard {
    position: absolute;
    top: 110px;
    left: -340px;
    width: 300px;
    bottom: 35px;
    background: rgba(255, 255, 255, 0.85);
    z-index: 5500;
    padding: 18px;
    overflow-y: auto;
    box-shadow: none;
    transition: 0.3s;
    font-family: Arial;
    overflow-x: hidden;
}

.dashboard-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

#dashboard > div {
    position: relative;
    z-index: 1;
}

#dashboard.active {
    left: 0;
}

#dashboard h2 {
    margin: 0;
    color: #5a3e2b;
}

#dashboard hr {
    margin: 10px 0;
}

.dashboard-section {
    margin-bottom: 18px;
}

.dashboard-section label {
    font-weight: bold;
}

.dashboard-section input,
.dashboard-section button {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
}

.dashboard-section button {
    background: #8b5e3c;
    color: white;
    border: none;
    cursor: pointer;
}

.dashboard-info {
    background: #f3f3f3;
    padding: 8px;
    margin-top: 8px;
    font-size: 14px;
}

#footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #8b5e3c;
    color: white;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    z-index: 5000;
}

#gmLayersBtn {
    position: absolute;
    bottom: 60px;
    right: 20px;
    width: 110px;
    height: 85px;
    background: #5a3e2b;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    cursor: pointer;
    overflow: hidden;
    z-index: 1002;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border: 2px solid #3d2a1e;
}

#gmLayersBtn img {
    position: absolute;
    width: 100%;
    height: 75%;
    object-fit: cover;
    top: 0;
    filter: sepia(60%) saturate(60%) brightness(0.75);
}

#gmLayersBtn span {
    position: relative;
    background: #3d2a1e;
    color: #f5dfc0;
    text-align: center;
    font-weight: bold;
    padding: 6px 0;
    font-size: 14px;
    letter-spacing: 1px;
}

#gmPanel {
    position: absolute;
    bottom: 150px;
    right: 20px;
    width: 260px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 2000;
    padding: 18px;
    display: none;
    font-family: Arial, sans-serif;
}

.gmOption {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
}

.gmDivider {
    height: 1px;
    background: #ddd;
    margin: 12px 0;
}

#header {
    position: relative;
    width: 100%;
    height: 110px;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 40px;
}

#header video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

#header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

#header img {
    height: 160px;
    margin-right: 40px;
    z-index: 2;
}

#header h1 {
    color: white;
    font-size: 32px;
    font-weight: bold;
    margin: 0;
    z-index: 2;
}

#northArrow {
    position: absolute;
    top: 130px;
    right: 20px;
    width: 65px;
    height: 65px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    z-index: 4000;
}

#map {
    position: absolute;
    top: 110px;
    bottom: 35px;
    width: 100%;
}

.leaflet-tooltip.lot-tooltip {
    background: rgba(255, 255, 255, 0.95);
    border: 1.5px solid #5a3e2b;
    border-radius: 8px;
    padding: 7px 11px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #2d1a0e;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    pointer-events: none;
}

.leaflet-tooltip.tanda-tooltip {
    background: rgba(255, 248, 220, 0.97);
    border: 1.5px solid #d5b43c;
    border-radius: 8px;
    padding: 7px 11px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #2d1a0e;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    pointer-events: none;
}

/* ================= MODAL DIALOG CANTIK ================= */

#pdfModal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: 99999;
    align-items: center;
    justify-content: center;
}

#pdfModal.show {
    display: flex;
}

#pdfModalBox {
    background: white;
    border-radius: 18px;
    width: 380px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    font-family: Arial, sans-serif;
    animation: modalPop 0.25s ease;
}

@keyframes modalPop {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
}

#pdfModalHeader {
    background: linear-gradient(135deg, #5a3e2b, #8b5e3c);
    padding: 22px 24px 18px;
    text-align: center;
    color: white;
}

#pdfModalHeader .modal-icon {
    font-size: 38px;
    margin-bottom: 6px;
}

#pdfModalHeader h3 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.5px;
}

#pdfModalHeader p {
    margin: 6px 0 0;
    font-size: 12px;
    opacity: 0.85;
}

#pdfModalBody {
    padding: 24px 24px 10px;
}

#pdfModalBody label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    color: #5a3e2b;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
}

#pdfModalBody input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid #d4b896;
    border-radius: 10px;
    font-size: 14px;
    color: #2d1a0e;
    outline: none;
    box-sizing: border-box;
    transition: border 0.2s;
    background: #fffaf5;
}

#pdfModalBody input:focus {
    border-color: #8b5e3c;
    background: #fff8f0;
}

#pdfModalBody input::placeholder {
    color: #bbb;
    font-style: italic;
}

.modal-divider {
    height: 1px;
    background: #f0e6da;
    margin: 18px 0 16px;
}

#pdfModalFooter {
    padding: 0 24px 22px;
    display: flex;
    gap: 10px;
}

#pdfModalFooter button {
    flex: 1;
    padding: 11px 0;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}

#pdfModalFooter button:active {
    transform: scale(0.97);
}

#btnBatalModal {
    background: #f0e6da;
    color: #5a3e2b;
}

#btnHantarModal {
    background: linear-gradient(135deg, #5a3e2b, #8b5e3c);
    color: white;
    box-shadow: 0 4px 12px rgba(90,62,43,0.35);
}

#btnBatalModal:hover { opacity: 0.8; }
#btnHantarModal:hover { opacity: 0.9; }

</style>

<title>TAMAN SAUJANA PUTRA</title>
</head>

<body>

<div id="header">
    <video autoplay muted loop playsinline>
        <source src="VIDEO 1.mp4" type="video/mp4">
    </video>
    <img src="PUO.png">
    <h1>TAMAN SAUJANA PUTRA</h1>
</div>

<div id="map"></div>

<div id="northArrow">
    <img src="north.png" width="65">
</div>
    
<div id="menuBtn">☰ Menu</div>

<div id="dashboard">
    <video autoplay muted loop playsinline class="dashboard-video">
        <source src="DASHBOARD.mp4" type="video/mp4">
    </video>

    <div style="display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.7); padding: 5px; border-radius: 8px;">
        <h2 style="margin:0; color: #5a3e2b;">DASHBOARD</h2>
        <button id="closeDashboard" style="background:#5a3e2b;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;">✖</button>
    </div>
    
    <br>
    <hr>
    
    <div style="background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px;">
        <div class="dashboard-section">
            <label>Total Lot</label>
            <div id="totalLot" class="dashboard-info"></div>
        </div>

        <div class="dashboard-section">
            <label>Lot Opacity</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1">
        </div>

        <div class="dashboard-section">
            <label>Land Explorer</label>
            <input type="text" id="searchLot" placeholder="Masukkan No Lot">
            <button id="findLot">Find Lot</button>
            <button id="resetLot">Reset Lot</button>
        </div>

        <div class="dashboard-section">
            <label>Maklumat Lot Dipilih</label>
            <div id="lotInfo" class="dashboard-info">Tiada lot dipilih</div>
            <button id="generatePDF">Generate PDF Lot</button>
        </div>
    </div>
</div>

<div id="gmLayersBtn">
    <img src="MAPS.png">
    <span>Layers</span>
</div>

<div id="gmPanel">

<h3>Map Type</h3>
<div class="gmOption"><input type="radio" name="basemap" id="streetRadio" checked>Street</div>
<div class="gmOption"><input type="radio" name="basemap" id="satRadio">Satellite</div>
<div class="gmOption"><input type="radio" name="basemap" id="terrainRadio">Terrain</div>

<div class="gmDivider"></div>

<h3>Map Details</h3>
<div class="gmOption"><input type="checkbox" id="trafficCheck">Traffic</div>
<div class="gmOption"><input type="checkbox" id="transitCheck">Transit</div>
<div class="gmOption"><input type="checkbox" id="bikeCheck">Bicycling</div>

<div class="gmDivider"></div>

<h3>Data Layer</h3>
<div class="gmOption"><input type="checkbox" id="lotCheck" checked>Lot Final</div>
<div class="gmOption"><input type="checkbox" id="tandaCheck" checked>Tanda Sempadan</div>

</div>

<div id="footer">
    Hak Cipta Terpelihara 2026 @ Ikmwfy | Politeknik Ungku Omar
</div>

<!-- ================= MODAL CANTIK ================= -->
<div id="pdfModal">
    <div id="pdfModalBox">

        <div id="pdfModalHeader">
            <div class="modal-icon">📄</div>
            <h3>JANA PELAN AKUI</h3>
            <p>Sila isikan maklumat untuk cetakan PDF</p>
        </div>

        <div id="pdfModalBody">
            <label>✍️ &nbsp;Nama Penyemak</label>
            <input type="text" id="inputNamaSemak" placeholder="Contoh: MOHD AMIN BIN AHMAD" maxlength="60">
            <div class="modal-divider"></div>
        </div>

        <div id="pdfModalFooter">
            <button id="btnBatalModal">✖ &nbsp;Batal</button>
            <button id="btnHantarModal">🖨️ &nbsp;Jana PDF</button>
        </div>

    </div>
</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* ================= MAP SETTING ================= */

var map = L.map('map', {
    zoomControl: false,
    maxZoom: 22,
    minZoom: 5
}).fitBounds([
[2.10309049233999,102.52084635053448],
[2.1044455032659752,102.52331439237805]
]);

L.control.zoom({
    position: 'topleft'
}).addTo(map);

L.control.scale({
    metric:true,
    imperial:false
}).addTo(map);

/* ================= BASEMAP ================= */

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom: 22 });

var satellite = L.tileLayer(
'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{ maxZoom: 22 }).addTo(map);

var terrain = L.tileLayer(
'https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var traffic = L.tileLayer(
'https://mt1.google.com/vt/lyrs=h,traffic&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var transit = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,transit&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

var bicycling = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m,bike&x={x}&y={y}&z={z}',
{ maxZoom: 22 });

/* ================= LOT FINAL INTERACTIVE ================= */

function style_LOTFINAL_0() {
    return {
        color: '#5a3e2b',
        weight: 1,
        fillColor: '#a47148',
        fillOpacity: 1
    };
}

function highlightStyle() {
    return {
        color: '#000000',
        weight: 2,
        fillColor: 'yellow',
        fillOpacity: 1
    };
}

var selectedLayer = null;

function onEachFeature_LOTFINAL_0(feature, layer) {
    layer.on({
        click: function(e) {
            if (selectedLayer) {
                selectedLayer.setStyle(style_LOTFINAL_0());
            }
            selectedLayer = layer;
            layer.setStyle(highlightStyle());
            updateLotInfo(feature.properties);
            layer.bringToFront();

            var popupContent = `
<div style="font-family: Arial; font-size:14px;">
    <h4 style="margin:0; color:#5a3e2b;">Maklumat Lot</h4>
    <hr style="margin:6px 0;">
    <b>No PA:</b> ${feature.properties["tsp — _1"]}<br>
    <b>No Lot:</b> ${feature.properties["NO_LOT"]}<br>
    <b>Keluasan:</b> ${parseFloat(feature.properties["AREA"]).toFixed(3)} m²<br>
    <b>Pemilik:</b> ${feature.properties["tsp — pe"]}
</div>
`;
            layer.bindPopup(popupContent).openPopup();
        },

        mouseover: function(e) {
            var props = feature.properties;
            var tooltipContent =
                '<b style="color:#5a3e2b;">📦 Lot</b><br>' +
                '<b>No Lot:</b> ' + props["NO_LOT"] + '<br>' +
                '<b>No PA:</b> ' + props["tsp — _1"] + '<br>' +
                '<b>Pemilik:</b> ' + props["tsp — pe"] + '<br>' +
                '<b>Keluasan:</b> ' + parseFloat(props["AREA"]).toFixed(3) + ' m²';

            layer.bindTooltip(tooltipContent, {
                sticky: true,
                opacity: 1,
                className: 'lot-tooltip'
            }).openTooltip();
        },

        mouseout: function(e) {
            layer.closeTooltip();
            layer.unbindTooltip();
        }
    });
}

var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
    style: style_LOTFINAL_0,
    onEachFeature: onEachFeature_LOTFINAL_0
}).addTo(map);

/* ================= TANDA SEMPADAN + POPUP + HOVER ================= */

var tandaLayer = new L.geoJson(json_TandaSempadanGabung_1, {
    pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, {
            radius: 4,
            color: '#232323',
            fillColor: '#d5b43c',
            fillOpacity: 1
        });
    },
    onEachFeature: function(feature, layer) {
        layer.on({
            click: function(e) {
                var props = feature.properties;
                var content = '<div style="font-family:Arial; font-size:13px;">';
                content += '<h4 style="margin:0 0 6px 0; color:#5a3e2b;">🔶 Tanda Sempadan</h4>';
                content += '<hr style="margin:4px 0 8px 0;">';
                for (var key in props) {
                    if (props[key] !== null && props[key] !== "" && props[key] !== undefined) {
                        content += '<b>' + key + ':</b> ' + props[key] + '<br>';
                    }
                }
                if (Object.keys(props).length === 0) {
                    content += 'Tiada maklumat tambahan.';
                }
                content += '</div>';
                layer.bindPopup(content).openPopup();
            },

            mouseover: function(e) {
                var latlng = layer.getLatLng();
                var barat  = latlng.lng.toFixed(6) + '° BARAT';
                var utara  = latlng.lat.toFixed(6) + '° UTARA';
                var tooltipContent =
                    '<b style="color:#b8860b;">📍 Tanda Sempadan</b><br>' +
                    '<b>BARAT:</b> ' + barat + '<br>' +
                    '<b>UTARA:</b> ' + utara;
                layer.bindTooltip(tooltipContent, {
                    sticky: true,
                    opacity: 1,
                    className: 'tanda-tooltip'
                }).openTooltip();
            },

            mouseout: function(e) {
                layer.closeTooltip();
                layer.unbindTooltip();
            }
        });
    }
});

/* ================= PANEL FUNCTION ================= */

var gmPanel = document.getElementById("gmPanel");

document.getElementById("gmLayersBtn").onclick = function() {
    gmPanel.style.display = gmPanel.style.display === "block" ? "none" : "block";
};

document.getElementById("streetRadio").onclick = function() {
    map.removeLayer(satellite); map.removeLayer(terrain); map.addLayer(street);
};

document.getElementById("satRadio").onclick = function() {
    map.removeLayer(street); map.removeLayer(terrain); map.addLayer(satellite);
};

document.getElementById("terrainRadio").onclick = function() {
    map.removeLayer(street); map.removeLayer(satellite); map.addLayer(terrain);
};

document.getElementById("trafficCheck").onchange = function() {
    this.checked ? map.addLayer(traffic) : map.removeLayer(traffic);
};

document.getElementById("transitCheck").onchange = function() {
    this.checked ? map.addLayer(transit) : map.removeLayer(transit);
};

document.getElementById("bikeCheck").onchange = function() {
    this.checked ? map.addLayer(bicycling) : map.removeLayer(bicycling);
};

document.getElementById("lotCheck").onchange = function() {
    this.checked ? map.addLayer(layer_LOTFINAL_0) : map.removeLayer(layer_LOTFINAL_0);
};

document.getElementById("tandaCheck").onchange = function() {
    this.checked ? map.addLayer(tandaLayer) : map.removeLayer(tandaLayer);
};

/* ================= DASHBOARD FUNCTION ================= */

var dashboard = document.getElementById("dashboard");
var menuBtn = document.getElementById("menuBtn");
var closeBtn = document.getElementById("closeDashboard");

menuBtn.onclick = function() {
    dashboard.classList.add("active");
    menuBtn.style.display = "none";
};

closeBtn.onclick = function() {
    dashboard.classList.remove("active");
    menuBtn.style.display = "block";
};

/* ================= TOTAL LOT ================= */

document.getElementById("totalLot").innerHTML =
    layer_LOTFINAL_0.getLayers().length;

/* ================= LOT OPACITY ================= */

document.getElementById("opacitySlider").oninput = function() {
    var value = this.value;
    layer_LOTFINAL_0.eachLayer(function(layer) {
        layer.setStyle({ fillOpacity: value });
    });
};

/* ================= LAND EXPLORER ================= */

document.getElementById("findLot").onclick = function() {
    var searchValue = document.getElementById("searchLot").value;
    layer_LOTFINAL_0.eachLayer(function(layer) {
        if (layer.feature.properties["NO_LOT"] == searchValue) {
            map.fitBounds(layer.getBounds());
            map.invalidateSize();
            if (selectedLayer) {
                selectedLayer.setStyle(style_LOTFINAL_0());
            }
            selectedLayer = layer;
            layer.setStyle(highlightStyle());
            updateLotInfo(layer.feature.properties);
        }
    });
};

document.getElementById("resetLot").onclick = function() {
    document.getElementById("searchLot").value = "";
    layer_LOTFINAL_0.eachLayer(function(layer) {
        layer.setStyle(style_LOTFINAL_0());
    });
    selectedLayer = null;
    document.getElementById("lotInfo").innerHTML = "Tiada lot dipilih";
};

/* ================= UPDATE INFO PANEL ================= */

function updateLotInfo(properties) {
    document.getElementById("lotInfo").innerHTML = `
        <b>No PA:</b> ${properties["tsp — _1"]}<br>
        <b>No Lot:</b> ${properties["NO_LOT"]}<br>
        <b>Keluasan:</b> ${parseFloat(properties["AREA"]).toFixed(3)} m²<br>
        <b>Pemilik:</b> ${properties["tsp — pe"]}
    `;
}

layer_LOTFINAL_0.eachLayer(function(layer) {
    layer.on("click", function() {
        updateLotInfo(layer.feature.properties);
    });
});

function getBase64Image(url, callback) {
    var img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = function() {
        var canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        var dataURL = canvas.toDataURL("image/png");
        callback(dataURL);
    };
    img.src = url;
}

/* ================= MODAL BUKA / TUTUP ================= */

var pdfModal    = document.getElementById("pdfModal");
var inputNama   = document.getElementById("inputNamaSemak");

/* Buka modal apabila klik Generate PDF */
document.getElementById("generatePDF").onclick = function() {
    if (!selectedLayer) {
        alert("Sila pilih lot dahulu.");
        return;
    }
    inputNama.value = "";
    pdfModal.classList.add("show");
    setTimeout(function(){ inputNama.focus(); }, 300);
};

/* Tutup modal - Batal */
document.getElementById("btnBatalModal").onclick = function() {
    pdfModal.classList.remove("show");
};

/* Klik luar kotak - tutup modal */
pdfModal.onclick = function(e) {
    if (e.target === pdfModal) {
        pdfModal.classList.remove("show");
    }
};

/* Enter key - terus jana */
inputNama.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.getElementById("btnHantarModal").click();
    }
});

/* ================= GENERATE PDF A4 + LOGO ================= */

document.getElementById("btnHantarModal").onclick = function() {

    var namaSemak = inputNama.value.trim();

    if (!namaSemak) {
        inputNama.style.border = "2px solid red";
        inputNama.placeholder  = "⚠️ Nama wajib diisi!";
        inputNama.focus();
        return;
    }

    inputNama.style.border = "";
    pdfModal.classList.remove("show");

    getBase64Image("PUO.png", function(logoBase64) {
        getBase64Image("north.png", function(northBase64) {

            /* Zoom tepat ke lot dengan padding yang lebih kecil
               supaya lot nampak jelas dan berada di tengah peta */
            map.fitBounds(selectedLayer.getBounds(), {
                padding: [120, 120],
                animate: false,
                maxZoom: 20
            });

            map.invalidateSize();

            setTimeout(function() {

                map.closePopup();

                html2canvas(document.getElementById("map"), {
                    useCORS: true,
                    scale: 4
                }).then(function(canvas) {

                    const { jsPDF } = window.jspdf;
                    var pdf = new jsPDF("landscape", "mm", "a4");
                    var mapImg = canvas.toDataURL("image/jpeg", 1.0);
                    var prop   = selectedLayer.feature.properties;

                    /* ---- SEMPADAN LUAR ---- */
                    pdf.setLineWidth(1.5);
                    pdf.rect(5, 5, 287, 200);

                    /* ---- PANEL KIRI ---- */
                    pdf.setLineWidth(0.8);
                    pdf.rect(5, 5, 60, 200);

                    /* ---- PANEL PETA (kanan atas) ---- */
                    pdf.rect(65, 5, 227, 165);

                    /* ---- PANEL MAKLUMAT (kanan bawah) ---- */
                    pdf.rect(65, 170, 227, 35);

                    /* ---- LOGO ---- */
                    pdf.addImage(logoBase64, 'PNG', 15, 8, 40, 40);

                    /* ---- NAMA INSTITUSI ---- */
                    pdf.setFont("times", "bold");
                    pdf.setFontSize(10);
                    pdf.text("POLITEKNIK UNGKU OMAR", 35, 52, { align: "center" });

                    /* ---- LOKASI ---- */
                    pdf.setFontSize(11);
                    pdf.setFont("times", "bold");
                    pdf.text("NEGERI JOHOR",   15, 68);
                    pdf.setTextColor(200, 0, 0);
                    pdf.text("DAERAH TANGKAK",  15, 78);
                    pdf.setTextColor(0, 0, 0);
                    pdf.text("MUKIM KESANG",    15, 88);

                    /* ---- MAKLUMAT LOT ---- */
                    pdf.setFontSize(11);
                    pdf.text("INFORMASI LOT",  15, 108);
                    pdf.setFont("times", "normal");

                    pdf.text("NO. LOT:",       15, 118);
                    pdf.text(prop["NO_LOT"],   40, 118);

                    pdf.text("NAMA PEMILIK:",  15, 130);
                    var owner     = prop["tsp — pe"] || "-";
                    var ownerText = pdf.splitTextToSize(owner, 42);
                    pdf.text(ownerText,        15, 137);

                    pdf.text("KELUASAN:",      15, 155);
                    var luas = parseFloat(prop["AREA"]).toFixed(2);
                    pdf.text(luas + " m²",     40, 155);

                    /* ---- TARIKH & PENYEMAK ---- */
                    var today = new Date().toLocaleDateString('en-GB');
                    pdf.text("TARIKH CETAKAN:", 15, 168);
                    pdf.text(today,              15, 174);

                    pdf.text("DISEMAK OLEH:",   15, 184);
                    var semakText = pdf.splitTextToSize(namaSemak.toUpperCase(), 45);
                    pdf.text(semakText,          15, 190);

                    /* ---- TAJUK PELAN ---- */
                    pdf.setFont("times", "bold");
                    pdf.setFontSize(22);
                    pdf.text("PELAN AKUI", 178, 16, { align: "center" });

                    /* ---- GAMBAR PETA - memenuhi panel peta sepenuhnya ---- */
                    /* Panel peta: x=65, y=5, w=227, h=165
                       Beri margin kecil 3mm dalam panel                      */
                    pdf.addImage(mapImg, 'JPEG', 68, 18, 221, 149);

                    /* ---- ANAK PANAH UTARA ---- */
                    pdf.addImage(northBase64, "PNG", 276, 20, 13, 13);

                    /* ---- NO PA BESAR DI PANEL BAWAH ---- */
                    pdf.setFontSize(26);
                    pdf.setFont("times", "bold");
                    var pa = prop["tsp — _1"] || "-";
                    pdf.text("PA " + pa, 178, 188, { align: "center" });

                    /* ---- FOOTER NOTA ---- */
                    pdf.setFontSize(7);
                    pdf.setFont("times", "normal");
                    pdf.text(
                        "Dokumen ini dijana secara digital melalui Sistem Maklumat Lot Tanah",
                        178, 203, { align: "center" }
                    );

                    pdf.save("Pelan_Akui_Lot_" + prop["NO_LOT"] + ".pdf");
                });

            }, 2500);
        });
    });
};

</script>
