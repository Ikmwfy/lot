<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">
<link rel="stylesheet" href="css/leaflet-search.css">
<link rel="stylesheet" href="css/leaflet.photon.css">

<style>
html, body, #map {
    width: 100%;
    height: 100%;
    padding: 0;
    margin: 0;
}

/* ===============================
   SIDE PANEL STYLE (TAMBAHAN SAHAJA)
================================= */
#sidePanel {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 320px;
    z-index: 1200;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: linear-gradient(145deg, #1e2430, #141922);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: #a5ffb2;
}

.card h3 {
    margin: 0 0 15px 0;
    font-size: 14px;
    color: #7CFC98;
}

.card input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #0e1117;
    color: white;
    font-size: 15px;
    margin-bottom: 15px;
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 10px;
}

.btn-green { background: #2e7d32; color: white; }
.btn-red { background: #c62828; color: white; }
.btn-blue { background: #1976d2; color: white; }

.info-value {
    font-size: 20px;
    font-weight: bold;
    color: #7CFC98;
}
</style>

<title>Peta Lot PUO</title>
</head>

<body>

<div id="map"></div>

<!-- ===============================
     SIDE PANEL (TAMBAHAN SAHAJA)
================================= -->
<div id="sidePanel">

    <div class="card">
        <h3>🔎 LOT OPACITY</h3>
        <input type="range" min="0" max="1" step="0.1" value="1"
               id="opacitySlider">
    </div>

    <div class="card">
        <h3>🌍 LAND EXPLORER</h3>
        <input type="text" id="lotSearch" placeholder="Masukkan No Lot">
        <button class="btn btn-green" onclick="findLot()">Find Lot</button>
        <button class="btn btn-red" onclick="resetLot()">Reset Lot</button>
    </div>

    <div class="card">
        <div>TOTAL LOT</div>
        <div class="info-value">67</div>
    </div>

    <div class="card">
        <div>NO LOT</div>
        <div class="info-value" id="noLot">-</div>
    </div>

    <div class="card">
        <div>OWNER</div>
        <div class="info-value" id="ownerName">-</div>
    </div>

    <div class="card">
        <div>AREA</div>
        <div class="info-value" id="areaLot">-</div>
    </div>

    <button class="btn btn-blue" onclick="generatePDF()">
        📄 Generate PDF Lot
    </button>

</div>

<!-- ===============================
     SCRIPT ASAL ANDA (TIDAK DIUBAH)
================================= -->

<script src="js/qgis2web_expressions.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/leaflet.rotatedMarker.js"></script>
<script src="js/leaflet.pattern.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>
<script src="js/rbush.min.js"></script>
<script src="js/labelgun.min.js"></script>
<script src="js/labels.js"></script>
<script src="js/leaflet.photon.js"></script>
<script src="js/leaflet-search.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TandaSempadanGabung_1.js"></script>

<script>

// ===============================
// INITIAL MAP (ASAL)
// ===============================

var map = L.map('map', {
    zoomControl:false, 
    maxZoom:28, 
    minZoom:1
}).fitBounds([[2.10309049233999,102.52084635053448],
              [2.1044455032659752,102.52331439237805]]);

var hash = new L.Hash(map);

// OpenStreetMap
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Google Satellite
var satellite = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    attribution: '&copy; Google'
});

var baseMaps = {
    "OpenStreetMap": osm,
    "Satelit": satellite
};

L.control.layers(baseMaps, null, {
    position: 'topright'
}).addTo(map);

L.control.zoom({
    position: 'topleft'
}).addTo(map);

// ===============================
// LOT LAYER (ASAL)
// ===============================

function style_LOTFINAL_0() {
    return {
        color: '#232323',
        weight: 1,
        fillColor: '#a47158',
        fillOpacity: 1
    }
}

var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
    style: style_LOTFINAL_0
}).addTo(map);

// ===============================
// TAMBAHAN FUNCTION PANEL SAHAJA
// ===============================

// OPACITY
document.getElementById("opacitySlider")
.addEventListener("input", function(e) {
    layer_LOTFINAL_0.setStyle({
        fillOpacity: e.target.value
    });
});

// FIND LOT
function findLot() {

    var lotNumber = document.getElementById("lotSearch").value;

    layer_LOTFINAL_0.eachLayer(function(layer) {

        if(layer.feature.properties.NO_LOT == lotNumber) {

            layer.setStyle({ fillColor: '#00ff00' });
            map.fitBounds(layer.getBounds());

            document.getElementById("noLot").innerHTML =
                layer.feature.properties.NO_LOT;

            document.getElementById("ownerName").innerHTML =
                layer.feature.properties.OWNER || "-";

            document.getElementById("areaLot").innerHTML =
                (layer.feature.properties.AREA || 0) + " m²";
        }
    });
}

// RESET
function resetLot() {
    layer_LOTFINAL_0.setStyle({ fillColor: '#a47158' });
    document.getElementById("noLot").innerHTML = "-";
    document.getElementById("ownerName").innerHTML = "-";
    document.getElementById("areaLot").innerHTML = "-";
}

// GENERATE FILE
function generatePDF() {

    var lot = document.getElementById("noLot").innerHTML;

    if(lot == "-") {
        alert("Sila pilih lot dahulu.");
        return;
    }

    var content =
        "No Lot: " + document.getElementById("noLot").innerHTML + "\n" +
        "Owner: " + document.getElementById("ownerName").innerHTML + "\n" +
        "Area: " + document.getElementById("areaLot").innerHTML;

    var blob = new Blob([content], { type: "text/plain" });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Lot_" + lot + ".txt";
    link.click();
}

</script>

</body>
</html>
